<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باركود نموذج التقديم | QR Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        h1 {
            color: #1e3a8a;
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 36px;
            text-align: center;
        }
        .cards {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(30,58,138,0.12);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-width: 220px;
        }
        .card svg {
            width: 180px;
            height: 180px;
            display: block;
        }
        .platform-name {
            font-weight: bold;
            color: #1e3a8a;
            font-size: 1.05rem;
        }
        .platform-url {
            color: #2563eb;
            font-size: 0.78rem;
            word-break: break-all;
            text-align: center;
            text-decoration: none;
        }
        .platform-url:hover { text-decoration: underline; }
        .hint {
            margin-top: 32px;
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }
        @media print {
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
