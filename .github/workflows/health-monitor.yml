name: 🔁 Health Monitor

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: 🩺 Check All Platforms
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare Pages
        id: cf
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://tameer-job-application.pages.dev)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Cloudflare Pages: $STATUS"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]

      - name: Check Vercel
        id: vercel
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://tameer-job-application.vercel.app 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Vercel: $STATUS"

      - name: Check Firebase Hosting
        id: firebase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://job-application-7f8d4.web.app 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Firebase: $STATUS"

      - name: Check Gateway Worker
        id: gateway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://tameer-gateway.REPLACE_ACCOUNT.workers.dev/__health 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Gateway: $STATUS"

      - name: Summary
        run: |
          echo "## 🩺 Platform Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Cloudflare Pages | ${{ steps.cf.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ▲ Vercel | ${{ steps.vercel.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Firebase Hosting | ${{ steps.firebase.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Gateway Worker | ${{ steps.gateway.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
