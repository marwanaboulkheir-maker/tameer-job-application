name: 🚀 Deploy All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ─── Build artifact shared by all deploy jobs ────────────────────────────────
jobs:
  build:
    name: 📦 Build & Minify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install minifier
        run: npm install -g terser

      - name: Minify JS
        run: |
          terser script.js --compress passes=2 --mangle --output deploy/script.js
          terser admin.js  --compress passes=2 --mangle --output deploy/admin.js

      - name: Sync HTML / CSS / Config
        run: |
          cp index.html   deploy/index.html
          cp admin.html   deploy/admin.html
          cp styles.css   deploy/styles.css
          cp admin.css    deploy/admin.css
          cp config.js    deploy/config.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/
          retention-days: 1

  # ─── Cloudflare Pages ────────────────────────────────────────────────────────
  deploy-cloudflare:
    name: ☁️ Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/

      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tameer-job-application
          directory:   deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─── Vercel ──────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: ▲ Vercel
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy
        run: |
          npm install -g vercel@latest
          vercel deploy deploy/ --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── Firebase Hosting ────────────────────────────────────────────────────────
  deploy-firebase:
    name: 🔥 Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              job-application-7f8d4
          channelId:              live

  # ─── GitHub Pages ─────────────────────────────────────────────────────────────
  deploy-github-pages:
    name: 📄 GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages:    write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Gateway Worker (runs after ALL platforms are live) ─────────────────────
  deploy-gateway:
    name: 🌐 Gateway Worker
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-vercel, deploy-firebase, deploy-github-pages]
    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: gateway
          command:          deploy

  # ─── Notify on failure ───────────────────────────────────────────────────────
  notify-failure:
    name: 🔔 Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-vercel, deploy-firebase, deploy-github-pages, deploy-gateway]
    if: failure()
    steps:
      - name: Report
        run: |
          echo "::error::One or more deployments failed — check logs above"
          echo "Cloudflare: ${{ needs.deploy-cloudflare.result }}"
          echo "Vercel:     ${{ needs.deploy-vercel.result }}"
          echo "Firebase:   ${{ needs.deploy-firebase.result }}"
          echo "GitHub:     ${{ needs.deploy-github-pages.result }}"
          echo "Gateway:    ${{ needs.deploy-gateway.result }}"
